name: Deploy Frontend to Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: github-actions-deployer-492717
  SERVICE: ai-frontend
  REGION: asia-south1
  IMAGE: gcr.io/github-actions-deployer-492717/ai-frontend

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # Updated to v4 to support current Node.js runtimes
      - name: Checkout
        uses: actions/checkout@v4

      # Updated to v2.1+ to ensure compatibility
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker
        run: gcloud auth configure-docker gcr.io

      - name: Build Image
        run: docker build -t $IMAGE ./frontend

      - name: Push Image
        run: docker push $IMAGE

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE \
            --image $IMAGE \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated
